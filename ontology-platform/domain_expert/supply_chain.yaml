## 七、规律 (Laws)

### 7.1 供应链牛鞭效应

**定义**: 需求信息在供应链各环节传递时，逐级放大导致上游波动远大于下游的现象。

**公式**:
```
波动放大系数 = 上游需求方差 / 下游需求方差
```

**应对原则**:
- 信息共享：打通供应链各环节数据
- 缩短lead time：缩短采购和交付周期
- 稳定需求：建立长期合作关系

### 7.2 库存周转规律

**定义**: 库存从入库到出库的循环效率。

**核心指标**:
```
库存周转率 = 期间出库成本 / 平均库存
周转天数 = 365 / 周转率
```

**行业基准**:
- 快消品: 8-12次/年
- 制造业: 4-6次/年
- 原材料: 2-4次/年

### 7.3 供应商准时交付率 (OTD)

**定义**: 供应商在承诺日期内完成交付的比例。

**计算公式**:
```
OTD = 准时交付订单数 / 总订单数 × 100%
```

**等级划分**:
- 优秀: OTD ≥ 98%
- 良好: 95% ≤ OTD < 98%
- 合格: 90% ≤ OTD < 95%
- 不合格: OTD < 90%

### 7.4 采购价格弹性

**定义**: 采购量变化对采购价格的影响程度。

**规律**:
- 采购量与单价呈负相关
- 长期合作价格低于短期采购
- 集中采购可获得更高折扣

