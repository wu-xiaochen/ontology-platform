## 六、燃气设备专项 (⭐ v2.0 新增)

### 6.1 燃气设备分类

```
燃气设备
├── 燃气表 (Gas Meter)
│   ├── 膜式表 (Diaphragm Meter) - 家用
│   ├── 罗茨表 (Roots Meter) - 商业
│   ├── 涡轮表 (Turbine Meter) - 工业
│   ├── 超声表 (Ultrasonic Meter) - 大流量
│   └── 腰轮表 (Rotary Meter) - 精确计量
├── 燃气调压器 (Gas Pressure Regulator)
│   ├── 区域调压器
│   ├── 楼栋调压器
│   └── 终端调压器
├── 燃气报警器 (Gas Detector)
│   ├── 家用报警器
│   ├── 商业报警器
│   └── 工业报警器
├── 燃气具 (Gas Appliance)
│   ├── 燃气热水器
│   ├── 燃气灶具
│   └── 燃气锅炉
└── 燃气管道 (Gas Pipeline)
    ├── 钢管
    ├── PE管
    └── 不锈钢波纹管
```

### 6.2 燃气设备选型规则

