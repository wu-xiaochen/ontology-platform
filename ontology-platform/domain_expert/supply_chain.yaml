| 家用膜式表 | 流量 | G1.6/G2.5/G4 | 奔腾、荣鑫、正泰 |
| 商业罗茨表 | 流量 | G10-G100 | 艾特、费希尔 |
| 工业涡轮表 | 流量、压力 | G100-G1000 | 埃尔斯特、施耐德 |
