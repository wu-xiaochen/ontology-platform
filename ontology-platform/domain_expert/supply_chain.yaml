## 四、风险指标 (⭐ v2.0 新增)

### 4.1 供应风险 (Supply Risk)

| 指标 | 定义 | 预警阈值 | 应对措施 |
|------|------|----------|----------|
| 单一来源依赖 | 供应商数量 | 单一供应商占比 > 60% | 开发备选供应商 |
| 产能不足 | 供应商产能利用率 | 利用率 > 90% | 签订产能预留协议 |
| 地理风险 | 供应商地理位置 | 位于自然灾害区 | 异地备货 |
| 交付中断 | 延迟交付记录 | 连续2次延迟 | 启动备货商 |
| 质量波动 | 不良率趋势 | 环比上升 > 20% | 加严检验 |

### 4.2 价格波动风险 (Price Volatility)

| 指标 | 定义 | 预警阈值 | 应对措施 |
|------|------|----------|----------|
| 价格涨幅 | 月度价格变化 | 涨幅 > 10% | 锁定价格/套保 |
| 市场供需 | 供需紧张指数 | 供需比 < 0.8 | 提前备货 |
| 原材料成本 | 大宗商品价格 | 涨幅 > 15% | 成本转嫁/锁价 |
| 汇率波动 | 进口物料汇率风险 | 波动 > 5% | 锁汇 |
| 价格欺诈 | 异常高价 | 报价 > 市场价30% | 重新询价 |

### 4.3 质量事故风险 (Quality Incident)

| 指标 | 定义 | 预警阈值 | 应对措施 |
|------|------|----------|----------|
| 重大质量问题 | 批量性不合格 | 不良批次 > 1 | 暂停供货 |
| 安全事故 | 造成人身伤害 | 任意事故 | 供应商停业整顿 |
| 环保违规 | 环保处罚 | 任意处罚 | 取消供应商资格 |
| 资质失效 | 证照过期 | 任意证照过期 | 暂停合作 |
| 产品召回 | 客户召回事件 | 任意召回 | 全面排查/索赔 |

### 4.4 供应商财务风险

| 指标 | 定义 | 预警阈值 | 应对措施 |
|------|------|----------|----------|
| 资产负债率 | 负债/资产 | > 70% | 缩短账期/预付款 |
| 利润状况 | 净利润 | 连续亏损 | 关注经营状态 |
| 涉诉情况 | 法律诉讼 | 重大诉讼 | 评估合作风险 |
| 经营异常 | 工商异常 | 任意异常 | 暂停合作 |

