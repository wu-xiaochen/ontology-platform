## 十一、核心业务场景 (MVP)

### 11.1 供应商风险管理 (⭐ 增强)

**场景**: 自动评估供应商风险等级，触发预警

**规则**:
```
IF 供应商绩效评分 < 60 THEN 标记为高风险
IF 供应商交付准时率 < 90% THEN 触发预警
IF 供应商财务异常 THEN 暂停合作并通知采购经理
IF 单一供应商占比 > 60% THEN 触发供应风险预警
IF 原材料价格涨幅 > 15% THEN 触发价格风险预警
```

### 11.2 智能询报价 (⭐ 增强)

**场景**: 自动向多个供应商发送询价请求

**规则**:
```
IF 采购金额 > 50000 THEN 询价供应商数量 >= 3
IF 物料类别 = 战略物资 THEN 只向A级供应商询价
IF 燃气设备采购 THEN 要求供应商提供计量器具许可证
```

### 11.3 库存优化建议 (⭐ 增强)

**场景**: 基于历史消耗数据给出补货建议

**规则**:
```
IF 当前库存 <= 安全库存 THEN 建议补货
IF 预测需求增长 > 20% THEN 建议提前备货
IF 供应商交付周期 > 30天 THEN 建议增加安全库存
```

### 11.4 燃气设备选型推荐 (⭐ 新增)

**场景**: 根据使用场景推荐燃气设备

**规则**:
```
IF 居民用户 AND 流量<10m³/h THEN 推荐家用膜式表
IF 商业用户 AND 流量10-100m³/h THEN 推荐商业罗茨表
IF 工业用户 AND 流量>100m³/h THEN 推荐涡轮/超声表
IF 防爆要求 THEN 推荐带防爆认证的品牌
```

