## 八、业务规则 (Rules)

### 8.1 供应商准入规则

| 条件 | 要求 |
|------|------|
| 资质要求 | 具备营业执照、相关行业许可证 |
| 质量体系 | 通过ISO 9001或同等质量体系认证 |
| 财务健康 | 资产负债率 < 70%，近两年盈利 |
| 产能要求 | 可满足订单峰值150%的产能 |
| 环保合规 | 符合当地环保法规要求 |

### 8.2 供应商绩效考核规则

**考核维度及权重**:

| 维度 | 权重 | 指标 |
|------|------|------|
| 质量 | 30% | 来料不良率、返工率、客诉次数 |
| 交付 | 30% | OTD准时率、订单变更响应速度 |
| 价格 | 20% | 与市场价格对比、年降幅度 |
| 服务 | 10% | 响应速度、技术支持能力 |
| 环保 | 10% | 环保合规、可持续发展 |

### 8.3 安全库存规则

**计算公式**:
```
安全库存 = (最大日用量 × 最长采购周期) - (平均日用量 × 平均采购周期)
```

**最低库存警示**:
- 触发补货: 库存 ≤ 安全库存
- 紧急补货: 库存 ≤ 安全库存 × 50%
- 断货风险: 库存 = 0

### 8.4 合同履约规则

- 付款账期: 默认月结30天，可协商
- 违约责任: 延迟交付按合同金额1%/天收取违约金
- 价格保护: 合同期内市场降价需同步调整
- 续约提前: 合同到期前60天启动续约评估

