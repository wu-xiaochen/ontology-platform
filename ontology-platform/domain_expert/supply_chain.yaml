## 三、采购流程 (⭐ v2.0 新增)

### 3.1 寻源阶段 (Sourcing)

```
需求识别 → 市场调研 → 潜在供应商筛选 → 资质预审 → 供应商名单确认
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 需求识别 | 用料计划、设计变更 | 需求规格说明书 | 需求准确性 |
| 市场调研 | 物料类别 | 供应商名单(≥3家) | 覆盖主流供应商 |
| 潜在供应商筛选 | 供应商名单 | 候选供应商 | 资质合规 |
| 资质预审 | 供应商资料 | 预审报告 | 证照齐全 |
| 供应商名单确认 | 预审报告 | 合格供应商名单 | 审批通过 |

### 3.2 议价阶段 (Negotiation)

```
询价发起 → 报价收集 → 议价谈判 → 价格确认 → 供应商选择
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 询价发起 | 需求规格、数量 | 询价单 | 询价供应商≥3家 |
| 报价收集 | 询价单 | 报价单 | 截止时间前 |
| 议价谈判 | 报价单 | 议价记录 | 记录留痕 |
| 价格确认 | 议价记录 | 最终报价 | 审批确认 |
| 供应商选择 | 最终报价 | 中标供应商 | 综合评分最优 |

**议价策略**:
- 批量采购: 采购量≥1000台，价格下浮8-12%
- 长期合作: 签订年度框架协议，价格下浮5-8%
- 竞争充分: 供应商≥5家时，可要求二次报价
- 战略物资: 与A级供应商独家议价

### 3.3 下单阶段 (Ordering)

```
订单生成 → 订单审核 → 订单下达 → 订单确认 → 订单跟踪
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 订单生成 | 供应商选择结果 | 采购订单草稿 | 数量、规格准确 |
| 订单审核 | 订单草稿 | 审核后订单 | 金额权限审批 |
| 订单下达 | 审核后订单 | 正式订单 | 双方签章确认 |
| 订单确认 | 正式订单 | 确认回执 | 供应商确认 |
| 订单跟踪 | 订单信息 | 交付状态 | 关键节点汇报 |

**审批权限**:
- < ¥10,000: 采购员
- ¥10,000 - ¥50,000: 采购经理
- ¥50,000 - ¥200,000: 采购总监
- ¥200,000 - ¥1,000,000: 副总经理
- > ¥1,000,000: 总经理/董事会

### 3.4 验收阶段 (Acceptance)

```
到货通知 → 外观检验 → 数量核对 → 质量检验 → 入库办理
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 到货通知 | 物流信息 | 到货单 | 核对订单号 |
| 外观检验 | 到货物料 | 外观检验报告 | 包装完整、无损 |
| 数量核对 | 到货数量 | 数量确认 | 与订单一致 |
| 质量检验 | 检验标准 | 质检报告 | 按抽检方案执行 |
| 入库办理 | 质检合格 | 入库单 | 库管签收 |

**验收标准**:
- 抽检比例: 按GB/T 2828.1标准执行
- 合格判定: 不合格数量 ≤ 抽检方案判定数
- 不合格处理: 退货、换货、降级使用

### 3.5 付款阶段 (Payment)

```
发票提交 → 三单匹配 → 付款申请 → 付款审批 → 资金支付
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 发票提交 | 供应商发票 | 发票接收 | 票面信息准确 |
| 三单匹配 | 发票、合同、验收单 | 匹配结果 | 三单一致 |
| 付款申请 | 匹配结果 | 付款单 | 账期核对 |
| 付款审批 | 付款单 | 审批结果 | 金额权限审批 |
| 资金支付 | 审批结果 | 付款凭证 | 银行回单 |

**付款条件**:
- 预付款: ≤ 30%，需提供银行保函
- 货到付款: ≤ 30%，验收合格后支付
- 验收款: ≤ 30%，验收合格后支付
- 质保金: 10%，质保期满后支付

