## 二、供应商评估维度 (⭐ v2.0 新增)

### 2.1 质量维度 (Quality)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 来料不良率 | Defect Rate | 不合格物料数量/总到货数量 | 不良数量/总数量×100% | 10% |
| 批次合格率 | Batch Pass Rate | 合格批次/总批次 | 合格批次/总批次×100% | 8% |
| 返工率 | Rework Rate | 返工数量/总数量 | 返工数量/总数量×100% | 6% |
| 客诉次数 | Customer Complaints | 客户投诉次数 | 累计次数 | 6% |

**评分标准**:
- 优秀 (90-100分): 不良率 ≤ 0.5%
- 良好 (75-89分): 0.5% < 不良率 ≤ 1%
- 合格 (60-74分): 1% < 不良率 ≤ 2%
- 不合格 (<60分): 不良率 > 2%

### 2.2 交付维度 (Delivery)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 准时交付率 | OTD (On-Time Delivery) | 准时交付订单数/总订单数 | 准时订单数/总订单数×100% | 12% |
| 订单变更响应速度 | Change Response Time | 订单变更到确认的时间 | 平均响应时间(小时) | 8% |
| 交期准确率 | Delivery Accuracy | 实际交期与承诺交期相符率 | 准确订单数/总订单数×100% | 10% |

**评分标准**:
- 优秀 (90-100分): OTD ≥ 98%
- 良好 (75-89分): 95% ≤ OTD < 98%
- 合格 (60-74分): 90% ≤ OTD < 95%
- 不合格 (<60分): OTD < 90%

### 2.3 成本维度 (Cost)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 价格竞争力 | Price Competitiveness | 与市场均价对比 | (市场均价-报价)/市场均价×100% | 8% |
| 年降幅度 | Annual Cost Reduction | 年度价格降幅 | (上年价格-本年价格)/上年价格×100% | 6% |
| 总拥有成本 | TCO (Total Cost of Ownership) | 采购+使用+维护总成本 | 采购价+使用成本+维护成本 | 6% |

**评分标准**:
- 优秀 (90-100分): 价格低于市场均价10%以上
- 良好 (75-89分): 价格低于市场均价5-10%
- 合格 (60-74分): 价格等于市场均价
- 不合格 (<60分): 价格高于市场均价

### 2.4 服务维度 (Service)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 响应速度 | Response Time | 询单/问题响应时间 | 平均响应时间(小时) | 4% |
| 技术支持 | Technical Support | 技术问题解决能力 | 评分(1-10) | 3% |
| 配合度 | Cooperation | 配合程度 | 评分(1-10) | 3% |

**评分标准**:
- 优秀 (90-100分): 响应时间 ≤ 2小时
- 良好 (75-89分): 2小时 < 响应时间 ≤ 4小时
- 合格 (60-74分): 4小时 < 响应时间 ≤ 8小时
- 不合格 (<60分): 响应时间 > 8小时

### 2.5 综合评分计算

```
综合评分 = 质量分×0.30 + 交付分×0.30 + 成本分×0.20 + 服务分×0.10 + 环保分×0.10
```

**供应商等级**:
- A级 (≥90分): 战略供应商，优先合作，年度框架协议
- B级 (75-89分): 合格供应商，正常合作
- C级 (60-74分): 观察供应商，辅导改进
- D级 (<60分): 不合格供应商，淘汰或替换

