version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ontology-platform/api:${VERSION:-latest}
    container_name: ontology-api-prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_TYPE=postgresql
      - DB_URL=postgresql://${DB_USER:-ontology}:${DB_PASSWORD}@db:5432/ontology
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - API_WORKERS=${API_WORKERS:-8}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: ontology-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3

  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: ontology-db-prod
    environment:
      - POSTGRES_USER=${DB_USER:-ontology}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=ontology
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backup:/backup
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-ontology}"]
      interval: 20s
      timeout: 5s
      retries: 3

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: ontology-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    restart: always

volumes:
  redis-data:
  pg-data:
