name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.version }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment artifact
        run: |
          IMAGE_TAG=${{ github.event.inputs.version || github.sha }}
          echo "IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG" >> $GITHUB_ENV

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.version != ''
    environment: staging

    steps:
      - name: Deploy to staging server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_STAGING }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY_STAGING }}
          IMAGE_TAG: ${{ github.event.inputs.version || github.sha }}
        run: |
          echo "Deploying to staging..."
          
          # SSH部署脚本
          ssh -o StrictHostKeyChecking=no -i /tmp/staging_key $SSH_USERNAME@$SSH_HOST << 'EOF'
            export IMAGE_TAG=$IMAGE_TAG
            cd /opt/ontology-platform
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
            
            # Update docker-compose
            export VERSION=$IMAGE_TAG
            docker-compose up -d
            
            # Health check
            sleep 15
            curl -f http://localhost:8000/api/v1/health || exit 1
            
            echo "Staging deployment completed!"
          EOF

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.version != ''
    environment: production

    steps:
      - name: Deploy to production server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_PROD }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY_PROD }}
          IMAGE_TAG: ${{ github.event.inputs.version || github.sha }}
        run: |
          echo "Deploying to production..."
          
          # SSH部署脚本
          ssh -o StrictHostKeyChecking=no -i /tmp/prod_key $SSH_USERNAME@$SSH_HOST << 'EOF'
            export IMAGE_TAG=$IMAGE_TAG
            cd /opt/ontology-platform
            
            # Backup database
            docker-compose exec -T db pg_dump -U ontology ontology > /backup/ontology_$(date +%Y%m%d_%H%M%S).sql
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
            
            # Rolling update
            docker-compose up -d --scale api=4
            sleep 10
            
            # Health check
            curl -f http://localhost:8000/api/v1/health || exit 1
            
            # Scale down to normal
            docker-compose up -d --scale api=2
            
            echo "Production deployment completed!"
          EOF

      - name: Create GitHub Release
        if: github.event.inputs.version != ''
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Send deployment notification
        run: |
          STATUS="✅ Success"
          if [ "${{ needs.deploy-production.result }}" == "failed" ]; then
            STATUS="❌ Failed"
          fi
          
          echo "Deployment $STATUS"
          
          # 可集成飞书/Slack/邮件通知
          # curl -X POST -H 'Content-Type: application/json' \
          #   -d "{\"text\": \"Ontology Platform Deployment: $STATUS\"}" \
          #   ${{ secrets.WEBHOOK_URL }}
