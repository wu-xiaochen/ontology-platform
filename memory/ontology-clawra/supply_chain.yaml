|----------|------|----------|----------|
| 资产负债率高 | 负债/资产 | > 70% | 缩短账期、预付款担保 |
| 利润亏损 | 净利润 | 连续亏损 | 关注经营状态、加强监控 |
| 重大涉诉 | 法律诉讼 | 重大诉讼 | 评估合作风险、要求担保 |
| 经营异常 | 工商异常 | 任意异常 | 暂停合作 |

### 4.5 供应链中断风险

