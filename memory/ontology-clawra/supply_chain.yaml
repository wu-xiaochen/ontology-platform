## 九、核心规律 (Laws)

### 9.1 供应链牛鞭效应

**定义**: 需求信息在供应链各环节传递时，逐级放大导致上游波动远大于下游的现象。

**公式**:
```
波动放大系数 = 上游需求方差 / 下游需求方差
```

**应对原则**:
- 信息共享：打通供应链各环节数据
- 缩短lead time：缩短采购和交付周期
- 稳定需求：建立长期合作关系

### 9.2 库存周转规律

**定义**: 库存从入库到出库的循环效率。

**核心指标**:
```
库存周转率 = 期间出库成本 / 平均库存
周转天数 = 365 / 周转率
```

**行业基准**:
- 快消品: 8-12次/年
- 制造业: 4-6次/年
- 原材料: 2-4次/年

### 9.3 供应商准时交付率 (OTD)

**定义**: 供应商在承诺日期内完成交付的比例。

**计算公式**:
```
OTD = 准时交付订单数 / 总订单数 × 100%
```

**等级划分**:
- 优秀: OTD ≥ 98%
- 良好: 95% ≤ OTD < 98%
- 合格: 90% ≤ OTD < 95%
- 不合格: OTD < 90%

### 9.4 采购价格弹性

**定义**: 采购量变化对采购价格的影响程度。

**规律**:
- 采购量与单价呈负相关
- 长期合作价格低于短期采购
- 集中采购可获得更高折扣

---

## 十、业务规则 (Rules)

### 10.1 供应商准入规则

| 条件 | 要求 |
|------|------|
| 资质要求 | 具备营业执照、相关行业许可证 |
| 质量体系 | 通过ISO 9001或同等质量体系认证 |
| 财务健康 | 资产负债率 < 70%，近两年盈利 |
| 产能要求 | 可满足订单峰值150%的产能 |
| 环保合规 | 符合当地环保法规要求 |

### 10.2 安全库存规则

**计算公式**:
```
安全库存 = (最大日用量 × 最长采购周期) - (平均日用量 × 平均采购周期)
```

**最低库存警示**:
- 触发补货: 库存 ≤ 安全库存
- 紧急补货: 库存 ≤ 安全库存 × 50%
- 断货风险: 库存 = 0

### 10.3 合同履约规则

- 付款账期: 默认月结30天，可协商
- 违约责任: 延迟交付按合同金额1%/天收取违约金
- 价格保护: 合同期内市场降价需同步调整
- 续约提前: 合同到期前60天启动续约评估

