# 采购供应链领域本体设计 (v3.0 通用版)

## 概述

本文档定义采购供应链领域的核心本体模型，用于指导知识库构建和智能化应用。**v3.0版本**从燃气设备垂直领域扩展为通用供应链本体，支持各类工业品、设备、服务的采购管理。燃气设备作为垂直用例保留，但不依赖特定行业。

---

## 一、概念定义 (Concepts)

### 1.1 核心实体

| 概念 | 英文 | 定义 | 关键属性 |
|------|------|------|----------|
| 供应商 | Supplier | 提供物料或服务的企业主体 | 供应商编码、名称、等级、资质、联系方式 |
| 采购商 | Buyer | 采购商品或服务的企业主体 | 企业编码、名称、行业、规模 |
| 物料 | Material | 采购或供应的物品 | 物料编码、名称、规格、类别、单位 |
| 采购需求 | Purchase Request | 采购需求的正式提出 | 需求编号、物料、数量、需求日期、用途 |
| 采购订单 | Purchase Order | 采购活动的正式书面确认 | 订单编号、日期、数量、单价、金额 |
| 合同 | Contract | 采购双方达成的法律协议 | 合同编号、类型、有效期、条款 |
| 仓库 | Warehouse | 存储物料的设施 | 仓库编码、位置、容量、类型 |
| 库存 | Inventory | 仓库中物料的实际数量 | 物料ID、仓库ID、数量、批次、库位 |
| 物流 | Logistics | 物料从供应商到采购商的运输过程 | 物流单号、运输方式、状态、轨迹 |
| 质检 | Quality Inspection | 到货物料的质量检验 | 检验单号、检验项、检验结果、判定 |
| 付款 | Payment | 采购款项的支付记录 | 付款单号、金额、付款方式、付款状态 |

### 1.2 关系定义

```
供应商 ⊚ 供应 [物料] (多对多)
供应商 ⊚ 签订 [合同] (一对多)
采购商 ⊚ 提出 [采购需求] (一对多)
采购需求 ⊚ 触发 [寻源] (一对一)
寻源 ⊚ 产生 [询价单] (一对多)
询价单 ⊚ 收到 [报价单] (多对一)
报价单 ⊚ 确定 [供应商] (多对一)
采购商 ⊚ 下达 [采购订单] (一对多)
采购订单 ⊚ 关联 [物料] (多对一)
采购订单 ⊚ 触发 [物流] (一对多)
物流 ⊚ 送达 [仓库] (多对一)
仓库 ⊚ 存储 [库存] (一对多)
库存 ⊚ 需要 [质检] (一对多)
质检 ⊚ 判定 [采购订单] (多对一)
采购订单 ⊚ 触发 [付款] (一对多)
物料 ⊚ 属于 [物料类别] (多对一)
合同 ⊚ 覆盖 [物料类别] (多对多)
```

