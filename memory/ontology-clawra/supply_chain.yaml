## 六、供应商管理

### 6.1 供应商生命周期

```
供应商开发 → 准入审核 → 等级评定 → 日常管理 → 绩效考核 → 等级调整/淘汰
```

| 阶段 | 关键活动 | 输出 |
|------|----------|------|
| 开发 | 寻源、筛选、初步接触 | 潜在供应商名单 |
| 准入 | 资质审核、现场审核、样品确认 | 合格供应商 |
| 评定 | 综合评分、等级确定 | 供应商等级 |
| 管理 | 订单执行、问题处理 | 合作记录 |
| 考核 | 绩效评估、问题反馈 | 考核报告 |
| 调整 | 等级调整或淘汰 | 新等级/退出 |

### 6.2 供应商准入规则

| 条件 | 要求 | 说明 |
|------|------|------|
| 资质要求 | 营业执照、相关行业许可证 | 必需证照齐全 |
| 质量体系 | ISO 9001或同等体系认证 | 优先条件 |
| 财务健康 | 资产负债率 < 70% | 近一年财报 |
| 产能要求 | 可满足订单峰值150% | 产能验证 |
| 环保合规 | 符合当地环保法规 | 环保证照 |
| 商业信用 | 无重大失信记录 | 信用查询 |

### 6.3 供应商绩效考核

| 维度 | 权重 | 考核周期 | 数据来源 |
|------|------|----------|----------|
| 质量 | 30% | 每季度 | IQC数据、客诉记录 |
