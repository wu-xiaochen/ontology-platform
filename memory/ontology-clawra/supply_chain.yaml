## 二、采购全链路流程

### 2.1 端到端采购流程

```
需求 → 寻源 → 询价 → 供应商选择 → 合同 → 订单 → 物流 → 验收 → 入库 → 付款
```

| 阶段 | 关键活动 | 核心产出 | 责任部门 |
|------|----------|----------|----------|
| 需求 | 需求提出、审批、汇总 | 采购需求单 | 需求部门 |
| 寻源 | 市场调研、供应商筛选、资质审核 | 合格供应商名单 | 采购部 |
| 询价 | 询价单发送、报价收集、比价分析 | 报价分析报告 | 采购部 |
| 供应商选择 | 供应商评选、审批 | 供应商选定结果 | 采购部/管理层 |
| 合同 | 合同起草、谈判、签订 | 采购合同 | 采购部/法务 |
| 订单 | 订单下达、确认、跟踪 | 采购订单 | 采购部 |
| 物流 | 发货、运输、到货跟踪 | 物流轨迹 | 物流/供应商 |
| 验收 | 到货检验、质量判定 | 验收报告 | 质量部 |
| 入库 | 入库办理、库存更新 | 入库单 | 仓储部 |
| 付款 | 发票匹配、付款申请、资金支付 | 付款凭证 | 财务部 |

### 2.2 寻源阶段 (Sourcing)

```
需求识别 → 市场调研 → 潜在供应商筛选 → 资质预审 → 供应商名单确认
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 需求识别 | 用料计划、设计变更、项目需求 | 需求规格说明书 | 需求准确性、紧急程度 |
| 市场调研 | 物料类别、目标市场 | 供应商名单(≥3家) | 覆盖主流供应商 |
| 潜在供应商筛选 | 供应商名单 | 候选供应商名单 | 资质合规、初筛淘汰 |
| 资质预审 | 供应商资料(营业执照、资质证照) | 预审报告 | 证照齐全、真实有效 |
| 供应商名单确认 | 预审报告 | 合格供应商名单 | 审批通过、纳入系统 |

**供应商来源渠道**:
- 行业展会/交流会
- 供应商推荐
- 公开招标
- B2B平台（阿里巴巴、慧聪网）
- 行业协会
- 现有供应商介绍

### 2.3 询价/议价阶段 (RFQ & Negotiation)

```
询价发起 → 报价收集 → 议价谈判 → 价格确认 → 供应商选择
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 询价发起 | 需求规格、数量、交期 | 询价单(RFQ) | 询价供应商≥3家 |
| 报价收集 | 询价单 | 报价单(Quote) | 截止时间前、完整报价 |
| 议价谈判 | 报价单 | 议价记录 | 多轮谈判、记录留痕 |
| 价格确认 | 议价记录 | 最终报价 | 审批确认 |
| 供应商选择 | 最终报价、比价表 | 中标供应商 | 综合评分最优 |

**议价策略**:
- 批量采购: 采购量≥1000件，价格下浮8-15%
- 长期合作: 签订年度框架协议，价格下浮5-10%
- 竞争充分: 供应商≥5家时，可要求二次报价
- 战略物资: 与A级供应商独家议价，锁定价格
- 紧急采购: 接受溢价但需事后审计

### 2.4 合同阶段 (Contracting)

```
合同起草 → 条款审核 → 合同谈判 → 合同签订 → 合同归档
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 合同起草 | 供应商选择结果、标准合同模板 | 合同草稿 | 条款完整 |
| 条款审核 | 合同草稿 | 审核意见 | 法务/财务审核 |
| 合同谈判 | 审核意见 | 修改后合同 | 双方协商一致 |
| 合同签订 | 修改后合同 | 签署版合同 | 双方签章 |
| 合同归档 | 签署版合同 | 合同档案 | 存档备查 |

**合同关键条款**:
| 条款类型 | 内容 | 风险控制 |
|----------|------|----------|
| 价格条款 | 单价、数量折扣、阶梯价 | 价格保护、锁价机制 |
| 交付条款 | 交期、运输方式、交付地点 | 延迟交付责任 |
| 质量条款 | 质量标准、检验方法、质保期 | 不合格处理 |
| 付款条款 | 账期、付款方式、预付款比例 | 付款条件 |
| 违约条款 | 违约金、解除条件 | 违约责任 |
| 保密条款 | 商业秘密保护 | 保密义务 |

### 2.5 订单执行阶段 (Order Execution)

```
订单生成 → 订单审核 → 订单下达 → 订单确认 → 生产/备货 → 发货 → 运输 → 到货
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 订单生成 | 供应商选择结果 | 采购订单草稿 | 数量、规格准确 |
| 订单审核 | 订单草稿 | 审核后订单 | 金额权限审批 |
| 订单下达 | 审核后订单 | 正式订单 | 双方签章确认 |
| 订单确认 | 正式订单 | 确认回执 | 供应商确认交期 |
| 生产/备货 | 订单确认 | 生产进度 | 关键节点汇报 |
| 发货 | 生产完成 | 发货通知 | 发货信息同步 |
| 运输 | 发货通知 | 在途信息 | 物流轨迹跟踪 |
| 到货 | 到达目的地 | 到货通知 | 收货验收准备 |

**审批权限**:
| 金额范围 | 审批人 |
|----------|--------|
| < ¥10,000 | 采购员 |
| ¥10,000 - ¥50,000 | 采购经理 |
| ¥50,000 - ¥200,000 | 采购总监 |
| ¥200,000 - ¥1,000,000 | 副总经理 |
| > ¥1,000,000 | 总经理/董事会 |

### 2.6 验收阶段 (Acceptance)

```
到货通知 → 外观检验 → 数量核对 → 质量检验 → 判定处理 → 入库办理
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 到货通知 | 物流信息 | 到货单 | 核对订单号 |
| 外观检验 | 到货物料 | 外观检验报告 | 包装完整、无损 |
| 数量核对 | 到货数量 | 数量确认 | 与订单一致 |
| 质量检验 | 检验标准、抽检方案 | 质检报告 | 按标准执行 |
| 判定处理 | 质检结果 | 判定结论 | 合格/退货/降级 |
| 入库办理 | 判定合格 | 入库单 | 库管签收 |

**验收标准**:
- 抽检比例: 按GB/T 2828.1标准执行(AQL)
- 合格判定: 不合格数量 ≤ 抽检方案判定数
- 不合格处理: 退货、换货、降级使用、索赔
- 免检条件: 免检供应商、免检物料（需审批）

### 2.7 付款阶段 (Payment)

```
发票提交 → 三单匹配 → 付款申请 → 付款审批 → 资金支付 → 付款完成
```

| 步骤 | 输入 | 输出 | 关键控制点 |
|------|------|------|------------|
| 发票提交 | 供应商发票 | 发票接收 | 票面信息准确 |
| 三单匹配 | 发票、合同、验收单 | 匹配结果 | 三单一致 |
| 付款申请 | 匹配结果 | 付款单 | 账期核对 |
| 付款审批 | 付款单 | 审批结果 | 金额权限审批 |
| 资金支付 | 审批结果 | 付款凭证 | 银行回单 |
| 付款完成 | 付款凭证 | 付款记录 | 勾兑完成 |

**付款条件**:
| 条件 | 比例 | 要求 |
|------|------|------|
| 预付款 | ≤ 30% | 需提供银行保函或信用证 |
| 货到付款 | ≤ 30% | 验收合格后支付 |
| 验收款 | ≤ 30% | 验收合格后支付 |
| 质保金 | 10% | 质保期满后支付 |

**账期类型**:
- 现结: 货到票到即付
- 月结30天: 次月对账后30天内付款
- 月结60/90天: 更长账期
- 承兑汇票: 银行承兑或商业承兑

