## 五、库存策略

### 5.1 库存类型

| 类型 | 定义 | 策略目标 |
|------|------|----------|
| 安全库存 | 防止缺货的最低库存 | 保障供应、降低缺货风险 |
| 周转库存 | 正常采购周期内的库存 | 平衡资金占用和采购成本 |
| 在途库存 | 已下单未到货的库存 | 纳入库存计划管理 |
| 呆滞库存 | 长期未使用的库存 | 减少资金占用、定期清理 |
| 预留库存 | 预留给特定订单的库存 | 确保订单执行 |

### 5.2 库存策略模型

| 策略 | 适用场景 | 特点 | 风险 |
|------|----------|------|------|
| 定量订货法 (EOQ) | 需求稳定、物料单价高 | 固定批量、定期检查 | 需准确预测 |
| 定期订货法 | 需求稳定、供应商稳定 | 固定周期、检查补货 | 库存水平波动 |
| 安全库存法 | 需求波动大、交付不确定 | 设定安全库存 | 资金占用增加 |
| JIT/零库存 | 需求稳定、供应商近 | 最小库存、成本低 | 抗风险能力弱 |
| VMI | 战略供应商、管理能力强 | 供应商管理库存 | 依赖供应商 |

### 5.3 安全库存计算

**基本公式**:
```
安全库存 = (最大日用量 × 最长采购周期) - (平均日用量 × 平均采购周期)
```

**改进公式（考虑服务水平和需求波动）**:
```
安全库存 = Z × √(LT × σ²D + D² × σ²LT)
其中:
- Z = 服务水平对应的安全系数
- LT = 采购周期
- D = 平均日用量
- σD = 日用量标准差
- σLT = 采购周期标准差
```

**安全系数参考**:
| 服务水平 | 安全系数Z |
|----------|-----------|
| 90% | 1.28 |
| 95% | 1.65 |
| 98% | 2.05 |
| 99% | 2.33 |

### 5.4 库存警示规则

| 警示级别 | 触发条件 | 建议行动 |
|----------|----------|----------|
| 正常 | 库存 > 安全库存 | 正常采购 |
| 警示 | 库存 ≤ 安全库存 | 建议补货 |
| 紧急 | 库存 ≤ 安全库存 × 50% | 紧急补货 |
| 断货 | 库存 = 0 | 启动应急采购 |

### 5.5 库存周转指标

```
库存周转率 = 期间出库成本 / 平均库存
周转天数 = 365 / 周转率
```

**行业基准参考**:
| 行业 | 周转率(次/年) | 周转天数(天) |
|------|---------------|--------------|
| 快消品 | 8-12 | 30-45 |
| 制造业 | 4-6 | 60-90 |
| 原材料 | 2-4 | 90-180 |
| IT/电子 | 6-10 | 36-60 |
| 化工 | 3-6 | 60-120 |

