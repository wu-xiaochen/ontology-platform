## 四、供应链风险类型

### 4.1 供应风险 (Supply Risk)

| 风险类型 | 定义 | 预警阈值 | 应对措施 |
|----------|------|----------|----------|
| 单一来源依赖 | 供应商集中度过高 | 单一供应商占比 > 60% | 开发备选供应商 |
| 产能不足 | 供应商产能利用率高 | 利用率 > 90% | 签订产能预留协议 |
| 地理风险 | 供应商地理位置风险 | 位于自然灾害区/政治风险区 | 异地备货、多源供应 |
| 交付中断 | 延迟交付频繁发生 | 连续2次延迟或累计3次 | 启动备货商 |
| 质量波动 | 不良率上升趋势 | 环比上升 > 20% | 加严检验、约谈供应商 |
| 资质失效 | 关键证照过期 | 任意关键证照过期 | 暂停合作、限期整改 |
| 经营异常 | 供应商经营异常 | 工商异常、行政处罚 | 评估合作风险 |

### 4.2 价格波动风险 (Price Volatility)

| 风险类型 | 定义 | 预警阈值 | 应对措施 |
|----------|------|----------|----------|
| 价格涨幅 | 月度价格变化大 | 涨幅 > 10% | 锁定价格/套保 |
| 市场供需 | 供需紧张 | 供需比 < 0.8 | 提前备货、锁定供应商 |
| 原材料成本 | 大宗商品价格上涨 | 涨幅 > 15% | 成本转嫁、锁价协议 |
| 汇率波动 | 进口物料汇率风险 | 波动 > 5% | 锁汇、自然对冲 |
| 价格欺诈 | 异常高价 | 报价 > 市场价30% | 重新询价、替换供应商 |

### 4.3 质量事故风险 (Quality Incident)

| 风险类型 | 定义 | 预警阈值 | 应对措施 |
|----------|------|----------|----------|
| 重大质量问题 | 批量性不合格 | 不良批次 > 1 | 暂停供货、追溯处理 |
| 安全事故 | 造成人身伤害 | 任意事故 | 供应商停业整顿、索赔 |
| 环保违规 | 环保处罚 | 任意处罚 | 取消供应商资格 |
| 产品召回 | 客户召回事件 | 任意召回 | 全面排查、索赔、追责 |

### 4.4 供应商财务风险

