## 三、供应商评估体系

### 3.1 评估维度 (通用)

| 维度 | 权重 | 说明 |
|------|------|------|
| 质量 Quality | 30% | 产品/服务质量稳定性 |
| 交付 Delivery | 30% | 准时交付和响应能力 |
| 成本 Cost | 20% | 价格竞争力和成本优化 |
| 服务 Service | 10% | 响应速度和技术支持 |
| 环保/合规 Environment | 10% | 环保合规和可持续发展 |

### 3.2 质量维度 (Quality)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 来料不良率 | Defect Rate | 不合格物料数量/总到货数量 | 不良数量/总数量×100% | 10% |
| 批次合格率 | Batch Pass Rate | 合格批次/总批次 | 合格批次/总批次×100% | 8% |
| 返工率 | Rework Rate | 返工数量/总数量 | 返工数量/总数量×100% | 6% |
| 客诉次数 | Customer Complaints | 客户投诉次数 | 累计次数 | 6% |

**评分标准**:
| 等级 | 分数 | 不良率 |
|------|------|--------|
| 优秀 | 90-100 | ≤ 0.5% |
| 良好 | 75-89 | 0.5% < ≤ 1% |
| 合格 | 60-74 | 1% < ≤ 2% |
| 不合格 | <60 | > 2% |

### 3.3 交付维度 (Delivery)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 准时交付率 | OTD | 准时交付订单数/总订单数 | 准时订单数/总订单数×100% | 12% |
| 订单变更响应速度 | Change Response | 订单变更到确认的时间 | 平均响应时间(小时) | 8% |
| 交期准确率 | Delivery Accuracy | 实际交期与承诺交期相符率 | 准确订单数/总订单数×100% | 10% |

**评分标准**:
| 等级 | 分数 | OTD要求 |
|------|------|---------|
| 优秀 | 90-100 | ≥ 98% |
| 良好 | 75-89 | 95% ≤ OTD < 98% |
| 合格 | 60-74 | 90% ≤ OTD < 95% |
| 不合格 | <60 | < 90% |

### 3.4 成本维度 (Cost)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 价格竞争力 | Price Competitiveness | 与市场均价对比 | (市场均价-报价)/市场均价×100% | 8% |
| 年降幅度 | Annual Cost Reduction | 年度价格降幅 | (上年价格-本年价格)/上年价格×100% | 6% |
| 总拥有成本 | TCO | 采购+使用+维护总成本 | 采购价+使用成本+维护成本 | 6% |

**评分标准**:
| 等级 | 分数 | 价格要求 |
|------|------|----------|
| 优秀 | 90-100 | 低于市场均价10%以上 |
| 良好 | 75-89 | 低于市场均价5-10% |
| 合格 | 60-74 | 等于市场均价 |
| 不合格 | <60 | 高于市场均价 |

### 3.5 服务维度 (Service)

| 指标 | 英文 | 定义 | 计算方式 | 权重 |
|------|------|------|----------|------|
| 响应速度 | Response Time | 询单/问题响应时间 | 平均响应时间(小时) | 4% |
| 技术支持 | Technical Support | 技术问题解决能力 | 评分(1-10) | 3% |
| 配合度 | Cooperation | 配合程度 | 评分(1-10) | 3% |

### 3.6 综合评分计算

```
综合评分 = 质量分×0.30 + 交付分×0.30 + 成本分×0.20 + 服务分×0.10 + 环保分×0.10
```

**供应商等级**:
| 等级 | 分数 | 合作策略 |
|------|------|----------|
| A级 | ≥90 | 战略供应商，优先合作，年度框架协议 |
| B级 | 75-89 | 合格供应商，正常合作 |
| C级 | 60-74 | 观察供应商，辅导改进 |
| D级 | <60 | 不合格供应商，淘汰或替换 |

