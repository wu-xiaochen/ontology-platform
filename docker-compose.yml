version: '3.8'

services:
  clawra:
    build: .
    container_name: clawra-app
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    volumes:
      - ./data:/app/data
    depends_on:
      - neo4j
      - chromadb
    restart: unless-stopped
    networks:
      - clawra-net

  neo4j:
    image: neo4j:5-community
    container_name: clawra-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - clawra-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: clawra-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - clawra-net

networks:
  clawra-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
